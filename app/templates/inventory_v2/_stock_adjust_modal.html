{# Manual stock adjustment modal (Admin/Manager only) — included from stock_list.html #}
<div id="adjust-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
  <div class="card" style="width:380px;padding:20px">
    <h3 style="margin-top:0">Adjust Stock — <span id="adjust-product-name"></span></h3>
    <form method="post" id="adjust-form" action="">
      <label style="font-size:12px;color:var(--text-muted)">New Available Quantity</label>
      <input type="number" step="any" name="new_qty" id="adjust-new-qty" required style="width:100%;margin-bottom:10px">
      <label style="font-size:12px;color:var(--text-muted)">Reason</label>
      <textarea name="reason" required style="width:100%;margin-bottom:14px" rows="3" placeholder="e.g. Physical count correction"></textarea>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button type="button" class="btn btn-sm btn-gray" onclick="closeAdjust()">Cancel</button>
        <button type="submit" class="btn btn-sm btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>
<script>
function openAdjust(productId, productName, currentQty) {
  document.getElementById('adjust-product-name').textContent = productName;
  document.getElementById('adjust-form').action = '/inventory-v2/stock/' + productId + '/adjust';
  document.getElementById('adjust-new-qty').value = currentQty;
  document.getElementById('adjust-modal').style.display = 'flex';
}
function closeAdjust() {
  document.getElementById('adjust-modal').style.display = 'none';
}
</script>
