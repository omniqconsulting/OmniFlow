{% extends "base.html" %}
{% block title %}New Purchase Order{% endblock %}
{% block content %}

<div class="page-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
  <div>
    <h2 class="page-title">New Purchase Order</h2>
  </div>
  <a href="/inventory-v2/purchase-orders" class="btn btn-sm btn-gray">← Purchase Orders</a>
</div>

{% if err %}<div class="alert alert-red" style="margin-bottom:14px">{{ err }}</div>{% endif %}

<form method="post" action="/inventory-v2/purchase-orders/create" id="po-form" style="max-width:760px">
  <div class="card" style="padding:20px;margin-bottom:16px">
    <h3 style="margin-top:0;font-size:13px;color:var(--text-faint);letter-spacing:.03em">VENDOR</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div>
        <label style="font-size:12px;color:var(--text-muted)">Vendor</label>
        <select name="vendor_id" style="width:100%">
          <option value="">Select vendor (or type name below)…</option>
          {% for v in vendors %}
          <option value="{{ v.id }}">{{ v.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label style="font-size:12px;color:var(--text-muted)">Vendor Name (if not in list)</label>
        <input type="text" name="vendor_name" style="width:100%">
      </div>
    </div>

    <label style="font-size:12px;color:var(--text-muted)">Expected Arrival Date</label>
    <input type="date" name="expected_arrival_date" style="width:200px">
  </div>

  <div class="card" style="padding:20px;margin-bottom:16px">
    <h3 style="margin-top:0;font-size:13px;color:var(--text-faint);letter-spacing:.03em">LINE ITEMS</h3>
    <table style="width:100%;font-size:13px;margin-bottom:10px" id="items-table">
      <thead>
        <tr style="text-align:left;color:var(--text-muted)">
          <th>Variant (SKU)</th><th>Qty Ordered</th><th>Unit Cost</th><th>Unit</th><th></th>
        </tr>
      </thead>
      <tbody id="items-body"></tbody>
    </table>
    <button type="button" class="btn btn-sm btn-outline" onclick="addRow()">+ Add Line Item</button>
  </div>

  <div class="card" style="padding:20px;margin-bottom:16px">
    <h3 style="margin-top:0;font-size:13px;color:var(--text-faint);letter-spacing:.03em">NOTES</h3>
    <textarea name="notes" rows="2" style="width:100%"></textarea>
  </div>

  <button type="submit" class="btn btn-primary">Create PO</button>
</form>

<script>
const variants = [{% for v in variants %}{id:"{{ v.id }}", name:"{{ (v.product.name if v.product else '')|e }} — {{ v.sku_code|e }}"},{% endfor %}];
const units = [{% for u in units %}{id:"{{ u.id }}", abbr:"{{ u.abbreviation|e }}"},{% endfor %}];

function addRow() {
  const tbody = document.getElementById('items-body');
  const tr = document.createElement('tr');
  let variantOpts = '<option value="">Select…</option>' + variants.map(v => `<option value="${v.id}">${v.name}</option>`).join('');
  let unitOpts = '<option value="">—</option>' + units.map(u => `<option value="${u.id}">${u.abbr}</option>`).join('');
  tr.innerHTML = `
    <td><select name="variant_id[]" required style="width:100%">${variantOpts}</select></td>
    <td><input type="number" name="qty_ordered[]" step="any" min="0.01" required style="width:90px"></td>
    <td><input type="number" name="unit_cost[]" step="any" min="0" style="width:90px"></td>
    <td><select name="unit_id[]" style="width:90px">${unitOpts}</select></td>
    <td><button type="button" class="btn btn-xs btn-gray" onclick="this.closest('tr').remove()">✕</button></td>
  `;
  tbody.appendChild(tr);
}
addRow();
</script>
{% endblock %}
