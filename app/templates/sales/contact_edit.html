{% extends "base.html" %}
{% block title %}Edit {{ customer.name }}{% endblock %}
{% block content %}

<div class="page-header" style="margin-bottom:18px">
  <h2 class="page-title">Edit Customer</h2>
  <div class="muted">{{ customer.name }}</div>
</div>

<div class="card" style="padding:20px;max-width:600px">
  <form method="post" action="/sales/contacts/{{ customer.id }}/edit">
    {% if is_full_editor %}
    <label style="font-size:12px;color:var(--text-muted)">Name *</label>
    <input name="name" value="{{ customer.name }}" required style="width:100%;margin-bottom:10px">

    <label style="font-size:12px;color:var(--text-muted)">Contact Person</label>
    <input name="contact_person" value="{{ customer.contact_person or '' }}" style="width:100%;margin-bottom:10px">

    <label style="font-size:12px;color:var(--text-muted)">Phone</label>
    <input name="phone" value="{{ customer.phone or '' }}" style="width:100%;margin-bottom:10px">

    <label style="font-size:12px;color:var(--text-muted)">Email</label>
    <input name="email" type="email" value="{{ customer.email or '' }}" style="width:100%;margin-bottom:10px">

    <label style="font-size:12px;color:var(--text-muted)">Tier</label>
    <select name="customer_tier" style="width:100%;margin-bottom:10px">
      {% for t in tier_choices %}<option value="{{ t }}" {{ 'selected' if t == customer.customer_tier else '' }}>{{ t }}</option>{% endfor %}
    </select>

    <label style="font-size:12px;color:var(--text-muted)">Contact Frequency (days)</label>
    <input name="contact_freq_days" type="number" value="{{ customer.contact_freq_days }}" style="width:100%;margin-bottom:10px">

    <label style="font-size:12px;color:var(--text-muted)">GSTIN</label>
    <input name="gstin" value="{{ customer.gstin or '' }}" style="width:100%;margin-bottom:10px">

    <label style="font-size:12px;color:var(--text-muted)">Credit Limit</label>
    <input name="credit_limit" type="number" step="0.01" value="{{ customer.credit_limit or '' }}" style="width:100%;margin-bottom:10px">

    {% if agents %}
    <label style="font-size:12px;color:var(--text-muted)">Assigned Agent</label>
    <select name="assigned_agent_id" style="width:100%;margin-bottom:10px">
      <option value="">Unassigned</option>
      {% for a in agents %}<option value="{{ a.id }}" {{ 'selected' if a.id == customer.assigned_agent_id else '' }}>{{ a.name }}</option>{% endfor %}
    </select>
    {% endif %}

    <label style="font-size:12px;color:var(--text-muted)">Price List</label>
    <select name="price_list_id" style="width:100%;margin-bottom:10px">
      <option value="">-- Default --</option>
      {% for pl in price_lists %}
      <option value="{{ pl.id }}" {% if customer.price_list_id == pl.id %}selected{% endif %}>
        {{ pl.name }}
      </option>
      {% endfor %}
    </select>

    <label style="font-size:12px;color:var(--text-muted)">Status</label>
    <select name="is_active" style="width:100%;margin-bottom:10px">
      <option value="1" {{ 'selected' if customer.is_active else '' }}>Active</option>
      <option value="0" {{ 'selected' if not customer.is_active else '' }}>Inactive</option>
    </select>
    {% endif %}

    <label style="font-size:12px;color:var(--text-muted)">Billing Address</label>
    <textarea name="billing_address" rows="2" style="width:100%;margin-bottom:10px">{{ customer.billing_address or '' }}</textarea>

    <label style="font-size:12px;color:var(--text-muted)">Shipping Address</label>
    <textarea name="shipping_address" rows="2" style="width:100%;margin-bottom:10px">{{ customer.shipping_address or '' }}</textarea>

    <label style="font-size:12px;color:var(--text-muted)">Notes</label>
    <textarea name="notes" rows="3" style="width:100%;margin-bottom:14px">{{ customer.notes or '' }}</textarea>

    <div style="display:flex;gap:8px">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="/sales/contacts/{{ customer.id }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
