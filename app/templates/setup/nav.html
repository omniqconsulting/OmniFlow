{# Shared left-navigation for Setup module. Include in each setup sub-page. #}
<style>
.setup-layout { display: flex; gap: 0; min-height: calc(100vh - 120px); }
.setup-sidenav {
  width: 200px; min-width: 200px; background: var(--bg-card);
  border-right: 1px solid var(--border-subtle);
  border-radius: 10px 0 0 10px; padding: 12px 0;
}
.setup-sidenav a {
  display: block; padding: 9px 18px; font-size: 13px; color: var(--text-muted);
  text-decoration: none; border-left: 3px solid transparent;
  transition: all 0.15s;
}
.setup-sidenav a:hover { color: var(--text-primary); background: var(--hover-bg); }
.setup-sidenav a.active { color: #60a5fa; border-left-color: #3b82f6; background: rgba(59,130,246,0.10); font-weight: 600; }
.setup-sidenav .nav-section-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-xfaint); padding: 14px 18px 4px; margin-top: 6px;
}
html.light .setup-sidenav { border-right-color: rgba(0,0,0,0.10); }
html.light .setup-sidenav a { color: #334155; }
html.light .setup-sidenav a:hover { color: #0f172a; background: rgba(0,0,0,0.05); }
html.light .setup-sidenav a.active { color: #1d4ed8; border-left-color: #2563eb; background: rgba(29,78,216,0.08); }
html.light .setup-sidenav .nav-section-label { color: #94a3b8; }
.setup-content { flex: 1; padding: 0 0 0 20px; min-width: 0; }
@media (max-width: 640px) {
  .setup-layout { flex-direction: column; }
  .setup-sidenav { width: 100%; min-width: 0; border-radius: 10px; border-right: none; border-bottom: 1px solid var(--border-subtle); display: flex; flex-wrap: wrap; padding: 8px 4px; }
  .setup-sidenav a { padding: 7px 12px; font-size: 12px; border-left: none; border-bottom: 2px solid transparent; }
  .setup-sidenav a.active { border-left-color: transparent; border-bottom-color: #3b82f6; }
  .setup-sidenav .nav-section-label { display: none; }
  .setup-content { padding: 16px 0 0; }
}
</style>

<div class="setup-sidenav">
  <div class="nav-section-label">Organisation</div>
  <a href="/setup" class="{{ 'active' if active_section == 'org' else '' }}">
    🏭 Organisation
  </a>
  <a href="/setup/employees" class="{{ 'active' if active_section == 'employees' else '' }}">
    👥 {{ L.Employees }}
  </a>

  <div class="nav-section-label">Reference Data</div>
  <a href="/setup/customers" class="{{ 'active' if active_section == 'customers' else '' }}">
    🤝 Customers
  </a>
  <a href="/setup/end-products" class="{{ 'active' if active_section == 'end_products' else '' }}">
    📦 End Products
  </a>
  <a href="/setup/vendors" class="{{ 'active' if active_section == 'vendors' else '' }}">
    🏭 Vendors
  </a>
  <a href="/setup/raw-materials" class="{{ 'active' if active_section == 'raw_materials' else '' }}">
    🧱 Raw Materials
  </a>
  <a href="/setup/custom-lists" class="{{ 'active' if active_section == 'custom_lists' else '' }}">
    📋 Custom Lists
  </a>

</div>
